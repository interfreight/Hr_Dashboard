<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interfreight HR Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fb;
display:flex;
min-height:100vh;
}

/* Sidebar */

.sidebar{
width:260px;
background:#003366;
color:white;
padding:20px;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
width:120px;
}

.logo h2{
margin-top:10px;
font-size:18px;
}

.menu{
margin-top:20px;
}

.menu a{
display:block;
padding:14px;
color:white;
text-decoration:none;
border-radius:10px;
margin-bottom:8px;
}

.menu a:hover{
background:#1E5AA8;
}

.menu a.active{
background:#F4C542;
color:#003366;
font-weight:bold;
}

/* Main */

.main{
flex:1;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
color:#003366;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.card h3{
color:#666;
margin-bottom:10px;
}

.card .number{
font-size:35px;
font-weight:bold;
color:#003366;
}

.queue{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.queue h2{
color:#003366;
margin-bottom:20px;
}

.employee{
border:1px solid #eee;
padding:20px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.employee-info h3{
color:#003366;
margin-bottom:5px;
}

.employee-info p{
color:#777;
}

.btn{
background:#F4C542;
color:#003366;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn:hover{
opacity:.9;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="3. INTERFREIGHT COMPANY LOGO.png" alt="Interfreight Logo">
<h2>INTERFREIGHT</h2>
</div>

<div class="menu">
<a href="#" class="active">Dashboard</a>
<a href="#">Employee Setup Queue</a>
<a href="#">Employee List</a>
<a href="#">Logout</a>
</div>

</div>

<div class="main">

<div class="header">
<h1>HR Dashboard</h1>
<p>Welcome HR Administrator</p>
</div>

<div class="stats">

<div class="card">
<h3>Total Employees</h3>
<div class="number" id="totalEmployees">0</div>
</div>

<div class="card">
<h3>Pending Setup</h3>
<div class="number" id="pendingEmployees">0</div>
</div>

<div class="card">
<h3>Completed Profiles</h3>
<div class="number" id="completedEmployees">0</div>
</div>

</div>

<div class="queue">

<h2>Employee Setup Queue</h2>

<div id="employeeQueue">

<div class="employee">

<div class="employee-info">
<h3>Loading...</h3>
<p>Please wait</p>
</div>

</div>

</div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://tuihpvykuqbqnfyfepql.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1aWhwdnlrdXFicW5meWZlcHFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3Mjg4OTcsImV4cCI6MjA5NzMwNDg5N30.HZKS8CgFLjkZ-Bx2AIjFjurH3IsKjvf37Ft852CzJsQ";

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

document.addEventListener("DOMContentLoaded", () => {
    loadDashboard();
});

async function loadDashboard() {
    await loadStats();
    await loadPendingEmployees();
}

async function loadStats() {

    // Total Employees

    const { count: totalEmployees, error: userError } =
        await supabase
        .from('users')
        .select('*', { count: 'exact', head: true });

    if(userError){
        console.error(userError);
        return;
    }

    document.getElementById("totalEmployees").textContent =
        totalEmployees || 0;

    // Completed Profiles

    const { count: completedProfiles, error: profileError } =
        await supabase
        .from('employee_profiles')
        .select('*', { count: 'exact', head: true })
        .eq('profile_completed', true);

    if(profileError){
        console.error(profileError);
        return;
    }

    document.getElementById("completedEmployees").textContent =
        completedProfiles || 0;

    document.getElementById("pendingEmployees").textContent =
        (totalEmployees || 0) - (completedProfiles || 0);
}

async function loadPendingEmployees() {

    const queue =
        document.getElementById("employeeQueue");

    queue.innerHTML = "";

    // Get all employee users

    const { data: users, error } =
        await supabase
        .from('users')
        .select('*')
        .order('id');

    if(error){
        console.error(error);
        queue.innerHTML = `
            <div class="employee">
                <div class="employee-info">
                    <h3>Error Loading Employees</h3>
                    <p>${error.message}</p>
                </div>
            </div>
        `;
        return;
    }

    let pendingCount = 0;

    for(const user of users){

        const { data: profile } =
            await supabase
            .from('employee_profiles')
            .select('profile_completed')
            .eq('user_id', user.id)
            .maybeSingle();

        const needsSetup =
            !profile ||
            profile.profile_completed === false;

        if(!needsSetup) continue;

        pendingCount++;

        queue.innerHTML += `
        <div class="employee">

            <div class="employee-info">
                <h3>${user.full_name || user.username}</h3>
                <p>${user.email || ''}</p>
                <p>Waiting for HR Profile Completion</p>
            </div>

            <button class="btn"
                onclick="openEmployee(${user.id})">
                Complete Profile
            </button>

        </div>
        `;
    }

    if(pendingCount === 0){

        queue.innerHTML = `
        <div class="employee">

            <div class="employee-info">
                <h3>No Pending Employees</h3>
                <p>All employee profiles are completed.</p>
            </div>

        </div>
        `;
    }
}

function openEmployee(userId){
    window.location.href =
        "employee-form.html?id=" + userId;
}

</script>
</body>
</html>
